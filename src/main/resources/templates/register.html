<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册 - 校园二手交易平台</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="auth panel">
    <h1 class="title">用户注册</h1>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>
    <form class="form" method="post" action="/register">
        <label>用户名 <input name="username" required maxlength="50"></label>
        <label>密码 <input type="password" name="password" required minlength="6" maxlength="100"></label>
        <label>确认密码 <input type="password" name="confirmPassword" required minlength="6" maxlength="100"></label>
        <label>手机号 <input name="phone" pattern="^1[3-9]\d{9}$" placeholder="可选"></label>
        <label>邮箱 <input type="email" name="email" placeholder="可选"></label>
        <button class="btn" type="submit">注册</button>
    </form>
    <p class="muted">已有账号？<a href="/login">去登录</a></p>
</main>
</body>
</html>
