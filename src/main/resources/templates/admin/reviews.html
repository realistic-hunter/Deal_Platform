<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>评价管理</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<header class="topbar"><a class="brand" href="/admin">管理后台</a><nav class="nav"><a href="/admin">后台首页</a><a href="/admin/goods">商品审核</a><a href="/logout">退出</a></nav></header>
<main class="container panel">
    <h1 class="title">评价管理</h1>
    <table class="table">
        <thead><tr><th>商品</th><th>买家</th><th>卖家</th><th>评分</th><th>内容</th><th>时间</th></tr></thead>
        <tbody>
        <tr th:each="review : ${reviews}">
            <td th:text="${review.goodsTitle}"></td>
            <td th:text="${review.buyerName}"></td>
            <td th:text="${review.sellerName}"></td>
            <td th:text="${review.score}"></td>
            <td th:text="${review.content}"></td>
            <td th:text="${review.createTime}"></td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
