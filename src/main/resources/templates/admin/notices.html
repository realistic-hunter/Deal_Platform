<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>公告管理</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/admin">管理后台</a>
    <nav class="nav"><a href="/admin/goods">商品审核</a><a href="/admin/categories">分类管理</a><a href="/admin/orders">订单管理</a><a href="/logout">退出</a></nav>
</header>
<main class="container panel">
    <h1 class="title">公告管理</h1>
    <form class="form" method="post" action="/admin/notices">
        <label>标题 <input name="title" required></label>
        <label>内容 <textarea name="content" required></textarea></label>
        <label>状态
            <select name="status"><option value="1">发布</option><option value="0">隐藏</option></select>
        </label>
        <button class="btn" type="submit">新增公告</button>
    </form>
    <table class="table">
        <thead><tr><th>标题</th><th>内容</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>
        <tr th:each="notice : ${notices}">
            <form method="post" th:action="@{/admin/notices/{id}(id=${notice.id})}">
                <td><input name="title" th:value="${notice.title}" required></td>
                <td><textarea name="content" required th:text="${notice.content}"></textarea></td>
                <td>
                    <select name="status">
                        <option value="1" th:selected="${notice.status == 1}">发布</option>
                        <option value="0" th:selected="${notice.status == 0}">隐藏</option>
                    </select>
                </td>
                <td><button class="btn light" type="submit">保存</button></td>
            </form>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
