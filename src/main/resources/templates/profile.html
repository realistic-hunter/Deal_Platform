<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>个人中心</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/goods">校园二手交易平台</a>
    <nav class="nav"><a href="/goods">商品列表</a><a href="/goods/my">我的发布</a><a href="/logout">退出</a></nav>
</header>
<main class="container">
    <section class="panel">
        <h1 class="title">个人信息</h1>
        <div class="alert error" th:if="${error}" th:text="${error}"></div>
        <div class="alert success" th:if="${message}" th:text="${message}"></div>
        <form class="form" method="post" action="/profile">
            <label>用户名 <input th:value="${user.username}" disabled></label>
            <label>角色 <input th:value="${user.roleName}" disabled></label>
            <label>昵称 <input name="nickname" th:value="${user.nickname}" required></label>
            <label>真实姓名 <input name="realName" th:value="${user.realName}"></label>
            <label>手机号 <input name="phone" th:value="${user.phone}" pattern="^1[3-9]\d{9}$"></label>
            <label>邮箱 <input type="email" name="email" th:value="${user.email}"></label>
            <button class="btn" type="submit">保存信息</button>
        </form>
    </section>
    <section class="panel">
        <h2 class="title">修改密码</h2>
        <form class="form" method="post" action="/profile/password">
            <label>旧密码 <input type="password" name="oldPassword" required></label>
            <label>新密码 <input type="password" name="newPassword" required minlength="6"></label>
            <label>确认新密码 <input type="password" name="confirmPassword" required minlength="6"></label>
            <button class="btn secondary" type="submit">修改密码</button>
        </form>
    </section>
</main>
</body>
</html>
