<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>消息中心</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="topbar">
    <a class="brand" href="/goods">校园二手交易平台</a>
    <nav class="nav"><a href="/goods">商品列表</a><a href="/profile">个人中心</a><a href="/logout">退出</a></nav>
</header>
<main class="container panel">
    <h1 class="title">消息中心</h1>
    <table class="table">
        <thead><tr><th>标题</th><th>内容</th><th>类型</th><th>状态</th><th>操作</th></tr></thead>
        <tbody>
        <tr th:each="item : ${notifications}">
            <td th:text="${item.title}"></td>
            <td th:text="${item.content}"></td>
            <td th:text="${item.type}"></td>
            <td th:text="${item.isRead == 1 ? '已读' : '未读'}"></td>
            <td>
                <form method="post" th:if="${item.isRead == 0}" th:action="@{/notifications/{id}/read(id=${item.id})}">
                    <button class="btn light" type="submit">标记已读</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
